<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>MD 測試</title>
<!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
<!-- <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script> -->
<style>
  body { font-family: sans-serif; padding: 20px; }
  pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
  code { font-family: monospace; }
</style>
</head>
<body>

<h1>Markdown 測試頁</h1>
<div id="md-content">載入中…</div>

<script type="module">
import { marked } from 'https://cdn.jsdelivr.net/npm/marked@5.1.0/lib/marked.esm.js';

fetch('md/01-SP-Basic.md')
  .then(res => res.text())
  .then(mdText => {
    document.getElementById('md-content').innerHTML = marked(mdText);
  })
  .catch(err => {
    document.getElementById('md-content').innerHTML = '載入 MD 檔案失敗：' + err;
  });
</script>

</body>
</html>
